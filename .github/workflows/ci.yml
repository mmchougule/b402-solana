name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  typecheck:
    name: typecheck (TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Downstream packages (sdk, mcp-server, relayer) consume each other via
      # workspace:* + dist/. Build producers' .d.ts before recursive typecheck.
      - run: pnpm --filter='@b402ai/solana-shared' build
      - run: pnpm --filter='@b402ai/solana-prover' build
      - run: pnpm --filter='@b402ai/solana' build
      - run: pnpm -r --if-present typecheck

  sdk-tests:
    name: sdk + shared (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build workspace deps first — vitest resolves @b402ai/solana-shared
      # AND @b402ai/solana-prover via their compiled dist/ output, which
      # doesn't exist until those packages are built. Without prover/dist,
      # b402.ts's import of AdaptProver/TransactProver fails to resolve and
      # b402-signer-config.test.ts can't load.
      - run: pnpm --filter='@b402ai/solana-shared' build
      - run: pnpm --filter='@b402ai/solana-prover' build
      - run: pnpm --filter='@b402ai/solana' test
      - run: pnpm --filter='@b402ai/solana-shared' --if-present test
      - run: pnpm --filter='@b402ai/solana-prover' --if-present test

  crypto-rust:
    name: crypto crate (cargo test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/crypto -> target
      - run: cargo test --manifest-path packages/crypto/Cargo.toml --lib

  workspace-clippy:
    name: workspace clippy (lib)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.89
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Enable feature flags that match the production-deployed binaries.
      # adapt_execute_v2 (PRD-35 commit_inputs path) and Phase 9 dual-note
      # are both shipped to mainnet; without these flags Anchor's #[program]
      # macro fails to resolve cfg-gated entrypoints at expansion time.
      - run: |
          cargo clippy --workspace --no-deps \
            --features b402-pool/prd_35_pending_inputs,b402-pool/phase_9_dual_note,b402-pool/inline_cpi_nullifier \
            --features b402-verifier-adapt/phase_9_dual_note \
            -- -D warnings
